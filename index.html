<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EcoSort</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<section id="gateway" class="view active">
  <div class="sticker-card center">
    <h1>EcoSort 🌱</h1>
    <button id="enterBtn">Enter</button>
  </div>
</section>

<section id="dashboard" class="view">
  <div class="sticker-card">
    <h2>Level 1 🌍</h2>
    <p>XP: 0</p>
    <p>Coins: 0</p>
  </div>
  <button id="openVision">Open Vision Engine 📷</button>
</section>

<section id="vision" class="view camera-view">
  <video id="camera" autoplay playsinline></video>
  <button id="captureBtn" class="fab">📸</button>
</section>

<div id="resultSheet" class="bottom-sheet">
  <h3>Prediction Results</h3>
  <div id="resultsContainer"></div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
